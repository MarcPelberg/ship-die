services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: shipdie
      POSTGRES_PASSWORD: shipdie
      POSTGRES_DB: shipdie
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shipdie -d shipdie"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    env_file:
      - path: .env
        required: false
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    command: node dist/src/web/server.js

  worker:
    build: .
    env_file:
      - path: .env
        required: false
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "while true; do node dist/src/worker/run-once.js; sleep 60; done"

  reader:
    build: .
    env_file:
      - path: .env
        required: false
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - whatsapp-auth:/app/.data/wa-auth
    command: node dist/src/ingest/baileys-reader.js

  caddy:
    image: caddy:2-alpine
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  postgres-data:
  whatsapp-auth:
  caddy-data:
  caddy-config:
